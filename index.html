<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Jam Digital · Info di Bawah Jam</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* RESET TOTAL & FULLSCREEN */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    body {
      background-image: url("https://large-blush-etdigtzzk0.edgeone.app/6c99b5492a6950ca1413246beb804662.jpg");
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
    }

    /* overlay gelap */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(0, 30, 30, 0.4) 0%, rgba(0, 0, 0, 0.75) 95%);
      backdrop-filter: blur(8px) saturate(180%);
      -webkit-backdrop-filter: blur(8px) saturate(180%);
      z-index: 1;
      pointer-events: none;
    }

    /* container jam — fullscreen & interaktif */
    .clock-landscape {
      position: relative;
      z-index: 20;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;      /* Ubah ke column agar jam di atas, info di bawah */
      align-items: center;
      justify-content: center;     /* Tengah vertikal juga */
      gap: clamp(1rem, 4vh, 3rem); /* Jarak vertikal antara jam dan info */
      padding: 2rem;
      background: rgba(8, 20, 16, 0.15);
      border: none;
      box-shadow: 0 0 150px rgba(0, 255, 213, 0.2) inset,
                  0 0 0 1px rgba(0, 255, 200, 0.2) inset;
      backdrop-filter: blur(16px) brightness(1.1);
      -webkit-backdrop-filter: blur(16px) brightness(1.1);
      transition: box-shadow 0.3s ease, backdrop-filter 0.3s;
      cursor: pointer;
    }

    /* TIME — tetap besar di atas */
    .time {
      font-size: clamp(5rem, 25vw, 16rem);  /* Lebih besar dan responsif */
      font-weight: 800;
      letter-spacing: 0.15em;
      color: #e6fffa;
      text-shadow: 0 0 20px #00ffe1, 
                   0 0 60px #00b3a0, 
                   0 0 120px #007a6e,
                   4px 4px 0px #00100e;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      transition: text-shadow 0.2s;
      margin-bottom: 0;            /* Jarak diatur oleh gap container */
    }

    .clock-landscape:hover .time {
      text-shadow: 0 0 35px #b5fff5, 
                   0 0 90px #00ffe1, 
                   0 0 150px #00ccb8;
    }

    /* Container info di bawah jam — tanpa border kiri */
    .info {
      display: flex;
      flex-direction: column;
      align-items: center;         /* Tengah horizontal */
      gap: 0.5rem;                 /* Jarak antara date dan label */
      text-align: center;
    }

    .date {
      font-size: clamp(1.4rem, 6vw, 3.5rem);
      font-weight: 500;
      color: #f0fffe;
      letter-spacing: 0.1em;
      text-shadow: 0 0 25px #00ffe0, 0 2px 8px black;
      white-space: nowrap;
    }

    .label {
      font-size: clamp(0.9rem, 2.5vw, 1.5rem);
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #c0fff0;
      background: rgba(0, 40, 30, 0.35);
      padding: 0.6em 1.8em;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid #00ffcc60;
      box-shadow: 0 0 30px #00ffcc40;
      display: inline-block;       /* Agar padding tepat */
    }

    /* garis bawah dekoratif (tetap ada) */
    .clock-landscape::after {
      content: '';
      position: absolute;
      bottom: 8%;
      left: 20%;
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ffdd, #a0fff0, #00ffdd, transparent);
      filter: blur(3px);
      opacity: 0.8;
      border-radius: 100%;
      pointer-events: none;
    }

    /* Responsive untuk landscape dan portrait */
    @media (orientation: landscape) {
      .clock-landscape {
        padding: 3rem 4rem;
        gap: clamp(1rem, 6vh, 4rem);
      }
    }

    @media (max-width: 800px) and (orientation: landscape) {
      .time {
        font-size: 18vh;           /* Ukuran berdasarkan tinggi layar */
        letter-spacing: 4px;
      }
      .date {
        font-size: 5vh;
      }
      .label {
        font-size: 2.2vh;
        letter-spacing: 4px;
        padding: 0.4em 1.5em;
      }
    }

    @media (orientation: portrait) {
      .time {
        font-size: 20vw;           /* Ukuran berdasarkan lebar */
      }
      .date {
        font-size: 6vw;
      }
      .label {
        font-size: 3.5vw;
      }
    }

    /* Safe area untuk notched devices */
    @supports (padding: max(0px)) {
      .clock-landscape {
        padding-left: max(2rem, env(safe-area-inset-left));
        padding-right: max(2rem, env(safe-area-inset-right));
        padding-top: max(2rem, env(safe-area-inset-top));
        padding-bottom: max(2rem, env(safe-area-inset-bottom));
      }
    }

    /* instruksi kecil (fade out) */
    .instruction {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      z-index: 30;
      pointer-events: none;
      transition: opacity 1s;
      text-shadow: 0 0 5px black;
    }
  </style>
</head>
<body>
  <div class="clock-landscape" id="fullscreenTrigger">
    <!-- Waktu utama di ATAS -->
    <div class="time" id="time">4:21</div>

    <!-- Informasi (hari/tanggal & label) di BAWAH jam -->
    <div class="info">
      <div class="date" id="date">Sabtu, 21 Feb</div>
      <div class="label">HORIZON · EDT</div>
    </div>
  </div>

  <div class="instruction" id="instruction">↗️ TAP UNTUK FULLSCREEN</div>

  <script>
    (function() {
      // ===== FUNGSI JAM =====
      const timeElement = document.getElementById('time');
      const dateElement = document.getElementById('date');

      function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        // Detik tidak ditampilkan sesuai permintaan (contoh gambar 4:21 tanpa detik)
        // Tapi kita bisa tampilkan jam:menit saja
        timeElement.textContent = `${hours}:${minutes}`;
        
        // Format tanggal: Hari, Tanggal Bulan (tanpa tahun, sesuai gambar)
        const dayName = now.toLocaleDateString('id-ID', { weekday: 'long' });
        const dayNumber = now.getDate();
        const monthName = now.toLocaleDateString('id-ID', { month: 'short' }); // "Feb"
        
        // Agar persis seperti gambar: "Sabtu, 21 Feb"
        dateElement.textContent = `${dayName}, ${dayNumber} ${monthName}`;
      }

      setInterval(updateClock, 1000);
      updateClock();

      // ===== FULLSCREEN LOGIC =====
      const container = document.getElementById('fullscreenTrigger');
      const instructionEl = document.getElementById('instruction');

      function enterFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
        setTimeout(() => {
          instructionEl.style.opacity = '0';
        }, 2000);
      }

      function exitFullscreen() {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }

      container.addEventListener('click', function() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
          enterFullscreen();
        } else {
          exitFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
      document.addEventListener('msfullscreenchange', handleFullscreenChange);

      function handleFullscreenChange() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
          instructionEl.style.opacity = '1';
        } else {
          instructionEl.style.opacity = '0';
        }
      }

      // Cegah gestur yang mengganggu
      window.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
      window.addEventListener('gesturestart', e => e.preventDefault());
      window.addEventListener('gesturechange', e => e.preventDefault());
      window.addEventListener('gestureend', e => e.preventDefault());

      // Sembunyikan address bar
      window.addEventListener('load', function() {
        window.scrollTo(0, 1);
      });

      window.addEventListener('touchstart', e => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
    })();
  </script>
</body>
</html>
