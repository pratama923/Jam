<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Jam Digital · Dengan Detik</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* RESET TOTAL & FULLSCREEN */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    body {
      background-image: url("https://large-blush-etdigtzzk0.edgeone.app/6c99b5492a6950ca1413246beb804662.jpg");
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
    }

    /* overlay gelap */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(0, 30, 30, 0.4) 0%, rgba(0, 0, 0, 0.75) 95%);
      backdrop-filter: blur(8px) saturate(180%);
      -webkit-backdrop-filter: blur(8px) saturate(180%);
      z-index: 1;
      pointer-events: none;
    }

    /* container jam — fullscreen & interaktif */
    .clock-landscape {
      position: relative;
      z-index: 20;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(0.5rem, 3vh, 2rem);
      padding: 2rem;
      background: rgba(8, 20, 16, 0.15);
      border: none;
      box-shadow: 0 0 150px rgba(0, 255, 213, 0.2) inset,
                  0 0 0 1px rgba(0, 255, 200, 0.2) inset;
      backdrop-filter: blur(16px) brightness(1.1);
      -webkit-backdrop-filter: blur(16px) brightness(1.1);
      transition: box-shadow 0.3s ease, backdrop-filter 0.3s;
      cursor: pointer;
    }

    /* TIME — dengan detik (3 segment) */
    .time {
      font-size: clamp(3rem, 15vh, 10rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #e6fffa;
      text-shadow: 0 0 20px #00ffe1, 
                   0 0 60px #00b3a0, 
                   0 0 120px #007a6e,
                   4px 4px 0px #00100e;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      transition: text-shadow 0.2s;
    }

    .clock-landscape:hover .time {
      text-shadow: 0 0 35px #b5fff5, 
                   0 0 90px #00ffe1, 
                   0 0 150px #00ccb8;
    }

    /* Container info di bawah jam */
    .info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      text-align: center;
    }

    .date {
      font-size: clamp(1rem, 5vh, 2.5rem);
      font-weight: 500;
      color: #f0fffe;
      letter-spacing: 0.1em;
      text-shadow: 0 0 25px #00ffe0, 0 2px 8px black;
      white-space: nowrap;
    }

    .label {
      font-size: clamp(0.7rem, 2.5vh, 1.2rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #c0fff0;
      background: rgba(0, 40, 30, 0.35);
      padding: 0.5em 1.5em;
      border-radius: 60px;
      backdrop-filter: blur(10px);
      border: 1px solid #00ffcc60;
      box-shadow: 0 0 30px #00ffcc40;
      display: inline-block;
    }

    /* garis bawah dekoratif */
    .clock-landscape::after {
      content: '';
      position: absolute;
      bottom: 8%;
      left: 20%;
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00ffdd, #a0fff0, #00ffdd, transparent);
      filter: blur(3px);
      opacity: 0.8;
      border-radius: 100%;
      pointer-events: none;
    }

    /* ===== ORIENTASI LANDSCAPE ===== */
    @media (orientation: landscape) {
      .clock-landscape {
        flex-direction: row;
        gap: clamp(2rem, 8vw, 6rem);
        padding: 1rem 3rem;
      }
      
      .time {
        font-size: clamp(4rem, 20vh, 12rem);
        letter-spacing: 0.15em;
      }
      
      .info {
        align-items: flex-start;
        border-left: 2px solid #00ffddb0;
        padding-left: clamp(1rem, 3vw, 3rem);
        gap: 0.5rem;
      }
      
      .date {
        font-size: clamp(1.2rem, 5vw, 2.8rem);
      }
      
      .label {
        font-size: clamp(0.8rem, 2vw, 1.2rem);
        letter-spacing: 0.4em;
        padding: 0.4em 1.2em;
      }
      
      .clock-landscape::after {
        bottom: 15%;
        width: 40%;
        left: 30%;
        opacity: 0.5;
      }
    }

    /* Landscape di layar kecil */
    @media (orientation: landscape) and (max-height: 600px) {
      .time {
        font-size: clamp(3rem, 15vh, 8rem);
      }
      
      .date {
        font-size: clamp(1rem, 4vh, 2rem);
      }
      
      .label {
        font-size: clamp(0.6rem, 1.8vh, 1rem);
        padding: 0.3em 1em;
      }
    }

    /* Portrait mode */
    @media (orientation: portrait) {
      .clock-landscape {
        flex-direction: column;
        gap: clamp(1rem, 4vh, 3rem);
      }
      
      .time {
        font-size: clamp(4rem, 20vw, 12rem);
      }
      
      .info {
        align-items: center;
        border-left: none;
        padding-left: 0;
      }
      
      .date {
        font-size: clamp(1.2rem, 5vw, 2.5rem);
      }
      
      .label {
        font-size: clamp(0.8rem, 3vw, 1.2rem);
      }
    }

    /* Safe area */
    @supports (padding: max(0px)) {
      .clock-landscape {
        padding-left: max(2rem, env(safe-area-inset-left));
        padding-right: max(2rem, env(safe-area-inset-right));
        padding-top: max(2rem, env(safe-area-inset-top));
        padding-bottom: max(2rem, env(safe-area-inset-bottom));
      }
    }

    /* instruksi kecil */
    .instruction {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      z-index: 30;
      pointer-events: none;
      transition: opacity 1s;
      text-shadow: 0 0 5px black;
    }
  </style>
</head>
<body>
  <div class="clock-landscape" id="fullscreenTrigger">
    <!-- Waktu utama DENGAN DETIK -->
    <div class="time" id="time">04:21:30</div>

    <!-- Informasi di bawah (atau samping di landscape) -->
    <div class="info">
      <div class="date" id="date">Sabtu, 21 Feb</div>
      <div class="label">HORIZON · EDT</div>
    </div>
  </div>

  <div class="instruction" id="instruction">↗️ TAP UNTUK FULLSCREEN</div>

  <script>
    (function() {
      // ===== FUNGSI JAM DENGAN DETIK =====
      const timeElement = document.getElementById('time');
      const dateElement = document.getElementById('date');

      function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0'); // DETIK KEMBALI
        timeElement.textContent = `${hours}:${minutes}:${seconds}`;
        
        const dayName = now.toLocaleDateString('id-ID', { weekday: 'long' });
        const dayNumber = now.getDate();
        const monthName = now.toLocaleDateString('id-ID', { month: 'short' });
        
        dateElement.textContent = `${dayName}, ${dayNumber} ${monthName}`;
      }

      setInterval(updateClock, 1000);
      updateClock();

      // ===== FULLSCREEN LOGIC =====
      const container = document.getElementById('fullscreenTrigger');
      const instructionEl = document.getElementById('instruction');

      function enterFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
          elem.msRequestFullscreen();
        }
        setTimeout(() => {
          instructionEl.style.opacity = '0';
        }, 2000);
      }

      function exitFullscreen() {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }

      container.addEventListener('click', function() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
          enterFullscreen();
        } else {
          exitFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
      document.addEventListener('msfullscreenchange', handleFullscreenChange);

      function handleFullscreenChange() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
          instructionEl.style.opacity = '1';
        } else {
          instructionEl.style.opacity = '0';
        }
      }

      // Cegah gestur yang mengganggu
      window.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
      window.addEventListener('gesturestart', e => e.preventDefault());
      window.addEventListener('gesturechange', e => e.preventDefault());
      window.addEventListener('gestureend', e => e.preventDefault());

      window.addEventListener('load', function() {
        window.scrollTo(0, 1);
      });

      window.addEventListener('touchstart', e => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
    })();
  </script>
</body>
</html>
